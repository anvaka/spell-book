// =========================================================================
//  CANVAS RENDERING -- constellation star map
// =========================================================================
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let stars = [];         // background stars
let constellations = []; // metaphor families
let hoveredStar = null;
let hoveredConstellation = null;
let animFrame;
let mouse = { x: -999, y: -999 };

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutConstellations();
}

// Layout: place constellation centres, then distribute metaphor stars around them
function layoutConstellations() {
  constellations = [];
  const cx = W / 2, cy = H / 2;
  const rOrbit = Math.min(W, H) * 0.32;
  const n = DATA.length;

  DATA.forEach((fam, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const fx = cx + Math.cos(angle) * rOrbit;
    const fy = cy + Math.sin(angle) * rOrbit;

    // total frequency for sizing
    const totalFreq = fam.metaphors.reduce((s, m) => s + m.frequency, 0);
    const famRadius = 14 + totalFreq * 0.6;

    const mStars = [];
    const nm = fam.metaphors.length;
    fam.metaphors.forEach((m, j) => {
      const mAngle = (j / nm) * Math.PI * 2 + angle;
      const dist = 40 + nm * 12 + Math.random() * 20;
      const mx = fx + Math.cos(mAngle) * dist;
      const my = fy + Math.sin(mAngle) * dist;
      const mRadius = 3 + Math.sqrt(m.frequency) * 2.2;
      mStars.push({
        x: mx, y: my, radius: mRadius,
        data: m, familyId: fam.id,
        twinkleOffset: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.5 + Math.random() * 1.5
      });
    });

    constellations.push({
      x: fx, y: fy, radius: famRadius,
      data: fam, stars: mStars,
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.3 + Math.random() * 0.8
    });
  });

  // background stars
  stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.3 + Math.random() * 2,
      brightness: 0.15 + Math.random() * 0.35
    });
  }
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // background gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#0f1528');
  grad.addColorStop(1, '#070a14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // background stars
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * s.twinkleSpeed + s.twinkleOffset);
    const alpha = s.brightness * (0.4 + 0.6 * twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,195,180,${alpha})`;
    ctx.fill();
  });

  // draw constellations
  constellations.forEach(c => {
    const [cr, cg, cb] = c.data.color;
    const isHoveredFamily = hoveredConstellation === c;

    // connection lines from family centre to each metaphor star
    c.stars.forEach(ms => {
      const lineAlpha = isHoveredFamily ? 0.25 : 0.08;
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(ms.x, ms.y);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${lineAlpha})`;
      ctx.lineWidth = isHoveredFamily ? 1.2 : 0.7;
      ctx.stroke();
    });

    // lines between adjacent metaphor stars
    for (let i = 0; i < c.stars.length; i++) {
      const a = c.stars[i];
      const b = c.stars[(i + 1) % c.stars.length];
      const lineAlpha = isHoveredFamily ? 0.18 : 0.05;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${lineAlpha})`;
      ctx.lineWidth = isHoveredFamily ? 0.9 : 0.5;
      ctx.stroke();
    }

    // metaphor stars
    c.stars.forEach(ms => {
      const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * ms.twinkleSpeed + ms.twinkleOffset);
      const isHovered = hoveredStar === ms;
      const glowSize = ms.radius * (isHovered ? 4.5 : 2.5 + twinkle * 1.2);

      // glow
      const grd = ctx.createRadialGradient(ms.x, ms.y, 0, ms.x, ms.y, glowSize);
      const ga = isHovered ? 0.35 : 0.12 + twinkle * 0.08;
      grd.addColorStop(0, `rgba(${cr},${cg},${cb},${ga})`);
      grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.beginPath();
      ctx.arc(ms.x, ms.y, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // core
      const coreAlpha = 0.7 + twinkle * 0.3;
      ctx.beginPath();
      ctx.arc(ms.x, ms.y, ms.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${Math.min(255, cr + 60)},${Math.min(255, cg + 60)},${Math.min(255, cb + 40)},${coreAlpha})`;
      ctx.fill();

      // label on hover
      if (isHovered) {
        ctx.font = '500 12px Inter, sans-serif';
        ctx.fillStyle = `rgba(${Math.min(255, cr + 80)},${Math.min(255, cg + 80)},${Math.min(255, cb + 60)},0.95)`;
        ctx.textAlign = 'center';
        ctx.fillText(ms.data.name, ms.x, ms.y - ms.radius - 10);
      }
    });

    // family centre star
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * c.twinkleSpeed + c.twinkleOffset);
    const centerGlow = c.radius * (isHoveredFamily ? 4 : 2.5 + twinkle);
    const grd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, centerGlow);
    const cga = isHoveredFamily ? 0.4 : 0.15 + twinkle * 0.1;
    grd.addColorStop(0, `rgba(${cr},${cg},${cb},${cga})`);
    grd.addColorStop(0.5, `rgba(${cr},${cg},${cb},${cga * 0.3})`);
    grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath();
    ctx.arc(c.x, c.y, centerGlow, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // centre core
    const ccAlpha = 0.8 + twinkle * 0.2;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.radius * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255, cr + 80)},${Math.min(255, cg + 80)},${Math.min(255, cb + 60)},${ccAlpha})`;
    ctx.fill();

    // family label
    ctx.font = `600 ${isHoveredFamily ? 14 : 13}px Inter, sans-serif`;
    ctx.fillStyle = `rgba(${Math.min(255, cr + 100)},${Math.min(255, cg + 100)},${Math.min(255, cb + 80)},${isHoveredFamily ? 1 : 0.75})`;
    ctx.textAlign = 'center';
    ctx.fillText(c.data.name, c.x, c.y + c.radius + 22);
  });

  animFrame = requestAnimationFrame(draw);
}

// Hit testing
function hitTest(mx, my) {
  // check metaphor stars first (smaller, in front)
  for (const c of constellations) {
    for (const ms of c.stars) {
      const dx = mx - ms.x, dy = my - ms.y;
      if (dx * dx + dy * dy < (ms.radius + 8) * (ms.radius + 8)) {
        return { type: 'metaphor', star: ms, constellation: c };
      }
    }
  }
  // then family centres
  for (const c of constellations) {
    const dx = mx - c.x, dy = my - c.y;
    if (dx * dx + dy * dy < (c.radius + 12) * (c.radius + 12)) {
      return { type: 'family', constellation: c };
    }
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  const hit = hitTest(mouse.x, mouse.y);
  hoveredStar = hit && hit.type === 'metaphor' ? hit.star : null;
  hoveredConstellation = hit ? hit.constellation : null;
  canvas.style.cursor = hit ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (!hit) return;
  if (hit.type === 'family') {
    showFamilyPanel(hit.constellation.data);
  } else if (hit.type === 'metaphor') {
    showDetailPanel(hit.star.data, hit.constellation.data);
  }
});

// =========================================================================
//  PANEL RENDERING
// =========================================================================
const familyPanel = document.getElementById('family-panel');
const detailPanel = document.getElementById('detail-panel');
const legend = document.getElementById('legend');

function hideAllPanels() {
  familyPanel.classList.add('hidden');
  detailPanel.classList.add('hidden');
  legend.classList.remove('faded');
}

function showFamilyPanel(fam) {
  detailPanel.classList.add('hidden');
  legend.classList.add('faded');

  const totalFreq = fam.metaphors.reduce((s, m) => s + m.frequency, 0);

  let html = `<button class="panel-close" onclick="hideAllPanels()" aria-label="Close">&times;</button>`;
  html += `<h2>${fam.name}</h2>`;
  html += `<span class="subtitle">${totalFreq} occurrences across the Origin</span>`;
  html += `<p class="family-desc">${fam.description}</p>`;
  html += `<ul class="metaphor-list">`;
  fam.metaphors.forEach(m => {
    html += `<li onclick='showDetailFromFamily(${JSON.stringify(m.name).replace(/'/g, "\\'")},"${fam.id}")'>
      <span class="m-freq">${m.frequency}x</span>
      <span class="m-name">${m.name}</span>
      <span class="m-brief">${m.brief}</span>
    </li>`;
  });
  html += `</ul>`;

  familyPanel.innerHTML = html;
  familyPanel.classList.remove('hidden');
}

window.showDetailFromFamily = function(mName, famId) {
  const fam = DATA.find(f => f.id === famId);
  const m = fam.metaphors.find(x => x.name === mName);
  if (m && fam) showDetailPanel(m, fam);
};

function showDetailPanel(m, fam) {
  familyPanel.classList.add('hidden');
  legend.classList.add('faded');

  let html = `<button class="panel-close" onclick="hideAllPanels()" aria-label="Close">&times;</button>`;
  html += `<button class="btn-back" onclick='showFamilyPanel(DATA.find(f=>f.id==="${fam.id}"))'>&#8592; ${fam.name}</button>`;
  html += `<h2>${m.name}</h2>`;
  html += `<span class="detail-family" onclick='showFamilyPanel(DATA.find(f=>f.id==="${fam.id}"))'>${fam.name} family &middot; ${m.frequency} occurrences</span>`;
  html += `<p class="analysis">${m.analysis}</p>`;

  m.passages.forEach(p => {
    html += `<div class="passage">
      <span class="p-chapter">${p.chapter}</span>
      <blockquote>&ldquo;${p.quote}&rdquo;</blockquote>
      <p class="p-comment">${p.comment}</p>
    </div>`;
  });

  if (m.closeReading) {
    html += `<div class="close-reading">
      <h3>${m.closeReading.title}</h3>
      <p>${m.closeReading.text}</p>
    </div>`;
  }

  detailPanel.innerHTML = html;
  detailPanel.classList.remove('hidden');
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideAllPanels();
});

// click outside panels to close
canvas.addEventListener('click', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (!hit) hideAllPanels();
});

// =========================================================================
//  INIT
// =========================================================================
window.addEventListener('resize', resize);
resize();
animFrame = requestAnimationFrame(draw);
</script>
</body>
</html>
